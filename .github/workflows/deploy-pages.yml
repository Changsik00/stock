name: Deploy to GitHub Pages

# 정적 스냅샷 배포 파이프라인 (PLAN.md 참고): Pages는 정적 호스팅이라 백엔드를 못 돌리므로,
# 이 워크플로가 매 실행마다 (1) 임시 DB에 최근 3년치 데이터를 수집하고, (2)
# backend/scripts/export_static.py로 정적 JSON 스냅샷을 만든 뒤, (3) 프런트를
# VITE_STATIC_DATA=1로 빌드해 그 스냅샷을 fetch하도록 만들어 Pages에 올린다.
# 실시간/종목 검색 등 DB에 상시 접근해야 하는 기능은 이 파이프라인 대상이 아니다.

on:
  push:
    branches: [main]
  schedule:
    # 평일 장마감 후 KST 18:30 = UTC 09:30
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      db:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: stock
          POSTGRES_USER: stock
          POSTGRES_PASSWORD: stock
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stock -d stock"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # pydantic-settings는 실제 환경변수를 .env 파일 값보다 우선한다(backend/app/config.py,
      # alembic/env.py 둘 다 get_settings().database_url을 사용) — 아래에서 만드는 .env에
      # 로컬 개발용 DATABASE_URL이 들어있더라도 이 값이 항상 이긴다. CI 서비스 DB(위 db
      # 컨테이너, 호스트에 5432로 노출)를 명시적으로 가리킨다.
      DATABASE_URL: postgresql+asyncpg://stock:stock@localhost:5432/stock
    steps:
      - uses: actions/checkout@v4

      # 리포 시크릿 DOT_ENV에 .env 전체 내용(외부 API 키 등)이 들어있다. echo는 stdout에
      # 아무 것도 남기지 않고 파일로만 리다이렉트하므로 로그에 노출되지 않는다 — 이후
      # 어떤 스텝에서도 `cat .env`/디버그 출력을 추가하지 말 것.
      - name: Create .env
        run: |
          echo "${{ secrets.DOT_ENV }}" > .env

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run DB migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Backfill index OHLCV (3y)
        working-directory: backend
        run: python -m scripts.backfill_index_ohlcv 3

      - name: Backfill KOFIA market fund/lending data (3y)
        working-directory: backend
        # 비공식 파싱 소스(freesis) — 사이트 개편 등으로 실패해도 잡 전체를 죽이지 않는다.
        run: python -m scripts.backfill_kofia 3 || echo "::warning::backfill_kofia failed, continuing without market fund/lending snapshot data"

      - name: Backfill macro data (3y)
        working-directory: backend
        # 환율(usdkrw)은 무키 네이버 marketIndex API 1차 + FRED DEXKOUS 폴백
        # (clients/naver_fx.py, 2026-07-19 ECOS 의존 제거) — ECOS_API_KEY 시크릿 불필요.
        # 유가는 yfinance→FRED 폴백. 만일을 대비해 실패해도 계속 진행한다.
        run: python -m scripts.backfill_macro 3 || echo "::warning::backfill_macro failed, continuing without full macro snapshot data"

      - name: Backfill market flow (최근 90일, 키움 ka10051)
        working-directory: backend
        # 시장(코스피/코스닥) 투자자별 순매수 — 키움 REST ka10051 (2026-07-19 pykrx→키움 교체).
        # 3년 전체 백필(~25분)은 CI마다 돌리기엔 과해서 최근 90일만 증분 적재한다
        # (이미 적재된 날짜는 스크립트가 스킵하므로 매 실행 비용은 실제로는 수 분 이내).
        # 주의: 키움 API는 앱키 발급 시 IP 등록제라 GitHub 호스티드 러너의 유동 IP에서는
        # 인증(토큰 발급)이 거부될 수 있다. 그 경우 이 스텝은 warning만 남기고 잡은 계속
        # 진행되며, 배포된 정적 스냅샷에서 "투자자별 수급" 섹션만 비게 된다(다른 데이터는
        # 정상 배포). 근본 해결은 고정 IP 러너/프록시 또는 self-hosted 러너 필요.
        run: python -m scripts.backfill_market_flow --days 90 || echo "::warning::backfill_market_flow failed (Kiwoom auth may be rejected from GitHub runner IPs — IP allowlist), continuing without market flow data"

      - name: Backfill K200 futures flow (최근 90일, 네이버)
        working-directory: backend
        # 외인/개인/기관계 선물(K200) 순매수 — 네이버 소스(clients/naver_futures_flow.py,
        # PLAN.md §4.5-2). 키움 앱키/IP 등록과 무관해 market_flow 스텝과 달리 GitHub
        # 러너에서도 안정적으로 동작할 것으로 예상되지만, 비공식 소스라 실패해도 잡
        # 전체를 죽이지 않는다.
        run: python -m scripts.backfill_futures_flow --days 90 || echo "::warning::backfill_futures_flow failed, continuing without K200 futures flow data"

      - name: Backfill program trading (차익/비차익, 키움 ka90010)
        working-directory: backend
        # 프로그램매매 차익/비차익 순매수(macro_series prog_arb_*/prog_nonarb_*, PLAN.md
        # §4.5-4) — ka90010은 한 콜에 최근 ~100거래일이 통째로 오므로 기본 lookback
        # (최근 3년, --years 미지정)을 그대로 돌려도 시장당 페이지 몇 개(총 20~40초)로
        # 끝난다. 단 위 market flow 스텝과 마찬가지로 KiwoomClient를 쓰므로 앱키가
        # IP 등록제라 GitHub 호스티드 러너의 유동 IP에서는 토큰 발급이 거부될 수
        # 있다 — 그 경우 이 스텝은 warning만 남기고 잡은 계속 진행되며, 배포된 정적
        # 스냅샷에서 "프로그램 차익 순매수" 타일만 비게 된다(다른 데이터는 정상 배포).
        run: python -m scripts.backfill_program_flow || echo "::warning::backfill_program_flow failed (Kiwoom auth may be rejected from GitHub runner IPs — IP allowlist), continuing without program trading data"

      - name: Collect ETF master/holdings (오늘 스냅샷)
        working-directory: backend
        # 비공식 네이버 소스 — 실패해도 잡 전체를 죽이지 않는다 (§4.5).
        run: python -m scripts.backfill_etf || echo "::warning::backfill_etf failed, continuing without ETF holdings data"

      - name: Collect flow rank (최근 2거래일)
        working-directory: backend
        run: python -m scripts.backfill_flow_rank || echo "::warning::backfill_flow_rank failed, continuing without flow rank data"

      - name: Collect market breadth (오늘 스냅샷)
        working-directory: backend
        # 비공식 네이버 소스 — 과거 소급 불가, 실행 시점 값만 적재 (§3.5/§4.6 3.6-2).
        run: python -m scripts.backfill_breadth || echo "::warning::backfill_breadth failed, continuing without market breadth data"

      - name: Collect value rank (오늘 스냅샷)
        working-directory: backend
        # 비공식 네이버 소스 — 과거 소급 불가 (§4.6 3.6-1). flow_rank market 컬럼 재수집 포함.
        run: python -m scripts.backfill_value_rank || echo "::warning::backfill_value_rank failed, continuing without value rank data"

      - name: Collect group snapshot (오늘 스냅샷)
        working-directory: backend
        # 비공식 네이버 소스 — 과거 소급 불가 (§4.6 3.6-3 업종·테마 트리맵).
        run: python -m scripts.backfill_group || echo "::warning::backfill_group failed, continuing without group snapshot data"

      - name: Export static JSON snapshot
        working-directory: backend
        run: python -m scripts.export_static --out-dir ../frontend/public/data

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static site
        working-directory: frontend
        run: VITE_STATIC_DATA=1 npm run build -- --base=/stock/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
